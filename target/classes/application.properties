spring.application.name=productbackend

# =========================
# DATABASE (SQL SERVER)
# =========================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=GallopsDB;encrypt=false;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=Strong@12345
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# =========================
# JPA
# =========================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# =========================
# SERVER
# =========================
server.port=8080

# =========================
# FILE UPLOAD
# =========================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# =========================
# FILE STORAGE PATH
# =========================
file.upload-dir=/workspaces/productbackend/uploads